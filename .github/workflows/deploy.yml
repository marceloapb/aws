name: Deploy API (SAM)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0

jobs:
  # ============ TESTES ============
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Run tests
        working-directory: apps/api
        run: npm test -- --passWithNoTests

  # ============ DEPLOY ============
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ (github.ref == 'refs/heads/main' && 'prod') || 'dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "STAGE=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "STAGE=prod" >> $GITHUB_OUTPUT
          else
            echo "STAGE=dev" >> $GITHUB_OUTPUT
          fi

      - name: SAM Build
        working-directory: apps/api
        run: sam build --use-container

      - name: SAM Deploy
        working-directory: apps/api
        run: |
          sam deploy \
            --stack-name mbf-${{ steps.stage.outputs.STAGE }}-api \
            --parameter-overrides \
              Stage=${{ steps.stage.outputs.STAGE }} \
              CloudFrontDomain=${{ secrets.CLOUDFRONT_DOMAIN }} \
              CloudFrontKeyPairId=${{ secrets.CLOUDFRONT_KEY_PAIR_ID }} \
              FrontendUrl=${{ secrets.FRONTEND_URL }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3

      - name: Output API URL
        working-directory: apps/api
        run: |
          API_URL=$(sam list stack-outputs \
            --stack-name mbf-${{ steps.stage.outputs.STAGE }}-api \
            --output json | jq -r '.[] | select(.OutputKey=="ApiUrl") | .OutputValue')
          echo "🚀 API deployed to: $API_URL"
          echo "API_URL=$API_URL" >> $GITHUB_STEP_SUMMARY
