AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Horizons Photography System - Serverless Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    CodeUri: .
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref HorizonsTable
        S3_BUCKET_NAME: !Ref FotosBucket
        COGNITO_USER_POOL_ID: !Ref UserPool

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handler.handler
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100

  AlbumRetentionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/albumRetentionJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 * * ? *)

  BackupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/backupJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 2 * * ? *)

  CalendarSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/calendarSyncJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)

  InstagramPublisherFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/instagramPublisherJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

  WhatsappReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/whatsappReminderJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 * * ? *)

  HorizonsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  FotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-fotos

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

Outputs:
  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref HorizonsTable
  BucketName:
    Value: !Ref FotosBucket
  UserPoolId:
    Value: !Ref UserPool
