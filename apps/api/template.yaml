AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MBF Systems API

Parameters:
  Stage:
    Type: String
    Default: prod
  CloudFrontDomain:
    Type: String
    Default: ''
  CloudFrontKeyPairId:
    Type: String
    Default: ''
  FrontendUrl:
    Type: String
    Default: 'https://app.bloise.com.br'

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
        CLOUDFRONT_DOMAIN: !Ref CloudFrontDomain
        CLOUDFRONT_KEY_PAIR_ID: !Ref CloudFrontKeyPairId
        FRONTEND_URL: !Ref FrontendUrl
        TABLE_NAME: !Ref MbfTable
        CLOUDFRONT_PRIVATE_KEY_PARAM: !Sub '/mbf/${Stage}/cloudfront/private-key'

Resources:
  MbfApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendUrl
          - 'http://localhost:3000'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        AllowCredentials: true

  MbfFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'mbf-${Stage}-api'
      Handler: app.handler
      CodeUri: .
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref MbfApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MbfTable
        - SSMParameterReadPolicy:
            ParameterName: !Sub 'mbf/${Stage}/*'

  MbfTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'mbf-${Stage}-table'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MbfApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  TableName:
    Description: DynamoDB table name
    Value: !Ref MbfTable
