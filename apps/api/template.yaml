AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Horizons Photography System - Serverless Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    CodeUri: .
    Tracing: Active
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref HorizonsTable
        S3_BUCKET_NAME: !Ref FotosBucket
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_USER_POOL_CLIENT_ID: !Ref UserPoolClient
        WEBHOOK_QUEUE_URL: !Ref WebhookQueue
        STAGE: prod
        CLOUDFRONT_DOMAIN: !GetAtt CDN.DomainName
        CF_KEY_PAIR_ID: '{{resolve:ssm:/horizons/prod/CF_KEY_PAIR_ID}}'

Resources:
  # ═══ API ═══
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handler.handler
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
        - SSMParameterReadPolicy:
            ParameterName: horizons/*
        - SQSSendMessagePolicy:
            QueueName: !GetAtt WebhookQueue.QueueName
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            AuthorizationScopes:
              - email
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # ═══ JOBS ═══
  AlbumRetentionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/albumRetentionJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 * * ? *)

  BackupFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/backupJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 2 * * ? *)

  CalendarSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/calendarSyncJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - SSMParameterReadPolicy:
            ParameterName: horizons/*
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)

  InstagramPublisherFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/instagramPublisherJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - S3CrudPolicy:
            BucketName: !Ref FotosBucket
        - SSMParameterReadPolicy:
            ParameterName: horizons/*
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

  WhatsappReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/jobs/whatsappReminderJob.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - SSMParameterReadPolicy:
            ParameterName: horizons/*
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 * * ? *)

  # ═══ WEBHOOK SQS ═══
  WebhookQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WebhookDLQ.Arn
        maxReceiveCount: 3

  WebhookDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  WebhookConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/webhookConsumer.handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HorizonsTable
        - SSMParameterReadPolicy:
            ParameterName: horizons/*
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt WebhookQueue.Arn
            BatchSize: 1

  # ═══ DYNAMO ═══
  HorizonsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-table
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ═══ S3 ═══
  FotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-fotos

  FotosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FotosBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FotosBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CDN}

  # ═══ CLOUDFRONT FOTOS ═══
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: HorizonsOAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt FotosBucket.RegionalDomainName
            Id: S3Origin
            OriginAccessControlId: !Ref OAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          TrustedKeyGroups:
            - !Ref CFKeyGroup
        Enabled: true

  CFKeyGroup:
    Type: AWS::CloudFront::KeyGroup
    Properties:
      KeyGroupConfig:
        Name: !Sub ${AWS::StackName}-keys
        Items:
          - !Ref CFPublicKey

  CFPublicKey:
    Type: AWS::CloudFront::PublicKey
    Properties:
      PublicKeyConfig:
        Name: !Sub ${AWS::StackName}-pubkey
        EncodedKey: '{{resolve:ssm:/horizons/prod/CF_PUBLIC_KEY}}'
        CallerReference: !Sub ${AWS::StackName}-pubkey-ref

  # ═══ COGNITO ═══
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ═══ FRONTEND ═══
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-web

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${WebBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebCDN}

  WebOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: HorizonsWebOAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebBucket.RegionalDomainName
            Id: WebS3Origin
            OriginAccessControlId: !Ref WebOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: WebS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        DefaultRootObject: index.html
        Enabled: true

Outputs:
  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref HorizonsTable
  BucketName:
    Value: !Ref FotosBucket
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  WebCDNUrl:
    Value: !GetAtt WebCDN.DomainName
  CDNUrl:
    Value: !GetAtt CDN.DomainName
  WebhookQueueUrl:
    Value: !Ref WebhookQueue
