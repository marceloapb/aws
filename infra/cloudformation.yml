AWSTemplateFormatVersion: '2010-09-09'
Description: Horizons Photography System - Infrastructure

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  BucketName:
    Type: String
    Default: horizons-photos

Resources:
  PhotosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: MoveToGlacierAfter1Year
            Status: Enabled
            Prefix: backups/
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 365
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600

  CDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt PhotosBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD]
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  EmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: horizons.com.br

Outputs:
  BucketArn:
    Value: !GetAtt PhotosBucket.Arn
  CDNDomain:
    Value: !GetAtt CDN.DomainName
